<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Model Arena</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #222222;
            --surface: #2c2c2c;
            --border: #3a3a3a;
            --text: #d4d0ca;
            --text-dim: #A2998B;
            --accent: #B31B1B;
            --danger: #EF4035;
            --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
            --sans: 'Source Sans 3', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .login-card {
            text-align: center;
            max-width: 360px;
            width: 100%;
        }
        .logo {
            font-family: var(--sans);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 2rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
        }
        input[type="password"]::placeholder {
            color: var(--text-dim);
        }
        .btn-enter {
            width: 100%;
            padding: 0.7rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-enter:hover {
            background: #8f1515;
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            min-height: 1.2em;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="logo">OPEN MODEL ARENA</h1>
        <form id="login-form" class="input-group">
            <input type="password" id="passphrase" placeholder="Enter passphrase" autocomplete="off" autofocus>
            <button type="submit" class="btn-enter">ENTER</button>
        </form>
        <p class="error-msg" id="error"></p>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('passphrase').value;
            const err = document.getElementById('error');
            err.textContent = '';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ passphrase: pass }),
                });
                if (resp.ok) {
                    window.location.href = '/';
                } else {
                    err.textContent = 'invalid passphrase';
                    document.getElementById('passphrase').value = '';
                    document.getElementById('passphrase').focus();
                }
            } catch {
                err.textContent = 'connection error';
            }
        });
    </script>
</body>
</html>
